<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catraca Puxa Ferro | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at 20% 20%, #1e293b 0%, #020617 100%);
            overflow: hidden; height: 100vh; color: #f8fafc;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
        }

        /* Digital com animação de Scan */
        .fingerprint-scanner {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .fingerprint-scanner::after {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid #fbbf24;
            border-radius: 1.5rem;
            animation: pulse-border 2s infinite;
            opacity: 0.5;
        }

        @keyframes pulse-border {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .numpad-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .numpad-btn:active {
            background: #fbbf24;
            color: #000;
            transform: scale(0.92);
        }

        /* Garante uma linha só no CPF */
        .cpf-display-text {
            white-space: nowrap;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-panel w-full max-w-6xl h-[620px] rounded-[50px] flex overflow-hidden relative">
        
        <div class="w-2/5 p-16 flex flex-col justify-between bg-gradient-to-br from-white/5 to-transparent border-r border-white/10">
            <div>
                <div class="flex items-center gap-3 mb-10">
                    <span class="h-1.5 w-8 rounded-full bg-yellow-400"></span>
                    <span class="text-[10px] font-black tracking-[0.4em] text-slate-400 uppercase">Premium Access</span>
                </div>
                
                <h1 class="text-7xl font-extrabold italic text-white tracking-tighter leading-[0.85] mb-6">
                    PUXA<br><span class="text-yellow-400">FERRO</span>
                </h1>
                <p class="text-slate-400 text-lg font-medium">Sua jornada começa aqui.<br><span class="text-white/60">Identifique-se.</span></p>
            </div>

            <div class="space-y-10">
                <div id="relogio" class="text-6xl font-extralight text-white/40 tracking-tighter">00:00</div>
                
                <div onclick="simularDigital()" class="fingerprint-scanner flex items-center gap-5 p-5 rounded-[30px] bg-white/5 border border-white/10 w-fit hover:bg-white/10 active:scale-95">
                    <div class="w-16 h-16 rounded-2xl bg-yellow-400 flex items-center justify-center text-black shadow-lg shadow-yellow-400/20">
                        <i class="fas fa-fingerprint text-3xl"></i>
                    </div>
                    <div>
                        <p class="text-white font-bold text-lg leading-tight">Check-in Biométrico</p>
                        <p class="text-yellow-400/60 text-[10px] font-black uppercase tracking-widest">Toque para escanear</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="areaDigitacao" class="flex-1 p-16 flex flex-col items-center justify-center bg-black/20">
            <div class="w-full max-w-md mb-8">
                <div class="flex justify-between items-end mb-3 px-4">
                    <span id="labelStatus" class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Aguardando CPF</span>
                    <span class="text-[10px] text-slate-600 font-bold uppercase" id="contador">0 / 11</span>
                </div>
                <div id="display" class="h-20 rounded-[25px] flex items-center justify-center bg-black/40 border border-white/5 overflow-hidden">
                    <span id="cpfText" class="cpf-display-text text-3xl font-mono font-bold text-white opacity-10">000.000.000-00</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 w-full max-w-md">
                <button onclick="add('1')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">1</button>
                <button onclick="add('2')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">2</button>
                <button onclick="add('3')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">3</button>
                <button onclick="add('4')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">4</button>
                <button onclick="add('5')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">5</button>
                <button onclick="add('6')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">6</button>
                <button onclick="add('7')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">7</button>
                <button onclick="add('8')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">8</button>
                <button onclick="add('9')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">9</button>
                <button onclick="backspace()" class="numpad-btn h-16 rounded-[22px] text-yellow-400 flex items-center justify-center"><i class="fas fa-chevron-left text-xl"></i></button>
                <button onclick="add('0')" class="numpad-btn h-16 rounded-[22px] text-2xl font-bold text-white">0</button>
                <button id="btnOk" onclick="verificarAcesso()" class="h-16 rounded-[22px] bg-yellow-400 text-black font-black text-xl shadow-lg shadow-yellow-400/10">OK</button>
            </div>
            <button onclick="limparTudo(true)" class="mt-8 text-slate-600 text-[10px] font-black uppercase tracking-widest hover:text-red-400 transition-all">Reiniciar</button>
        </div>

        <div id="telaResposta" class="absolute inset-0 hidden z-50 p-20 flex flex-col items-center justify-center text-center backdrop-blur-3xl bg-slate-950/90">
            <div id="iconBox" class="text-[120px] mb-8"></div>
            <h2 id="msgResposta" class="text-6xl font-black italic tracking-tighter mb-4"></h2>
            <p id="subMsg" class="text-slate-400 text-2xl font-light max-w-2xl"></p>
        </div>
    </div>

    <script src="script.js">
        
    </script>
</body>
</html>
